services:
  - type: web
    name: erp-system
    runtime: node
    buildCommand: npm install && npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: HERMES_BRIDGE_API_KEY
        sync: false
      - key: MARKETER_BRIDGE_API_KEY
        sync: false
      - key: DRIVE_TOKEN_ENC_KEY
        sync: false
